# Editable experiment configuration.
# Paths are resolved relative to the project root unless they are absolute.

[data]
data_dir = "data"
dataset_name = "rotatedhill"
dataset_key = "stress"
stress_format = "voigt_3d"
feature_names = ["s11", "s22", "s33", "s23", "s13", "s12"] # feature names
test_size = 0.1
random_state = 42
shuffle = true

[noise]
enabled = false
scale = 0.02
random_state = 42
relative_to_feature_std = true

[augmentation]
enabled = true
include_original = true
# Evaluate the held-out split on the same homogeneous scaling law as training.
augment_test = true
k_values = []
n_aug_per_sample = 5
k_range = [0.5, 1.75]
random_state = 42
shuffle = true
homogeneity_degree = 1.0
surface_target = 1.0

[invariants]
# The Python config automatically uses the full candidate pool I1 ... I13.
# The sparse encoder and post-training PySR ranking decide which invariants
# matter most for this yield surface.
enable_second_order = true
enable_fourth_order = true
homogenize = true ## STILL NEED TO BE VALIDATED
init_scale = 0.05
eps = 1e-12

[encoder]
enabled = true
# Use 0 to keep the same dimension as the selected invariant pool.
output_dim = 4
init = "identity" 

[model]
hidden_dims = [64, 64]
activation = "silu"
output_activation = "softplus"

[loss]
lambda_param = 1e-6
lambda_structure = 1e-3
lambda_encoder_l1_ratio = 5e-2 #increase for sparsity of S
lambda_encoder_l2 = 5e-2 #increase for sparsity of S (but be careful)
eps = 1e-12

[constraints.A_psd]
enabled = false
mode = "check"        # hard | penalty | check
target = "fourth_order_A"
basis = "mandel"
min_eigenvalue = 0.0
tolerance = 1e-8
penalty_weight = 1.0

[train]
run_id = "rotatedhill"
results_dir = "results"
split_dir = "results/splits"
use_saved_split = true
save_split_if_missing = true
seed = 42
epochs = 20000
# 0 means full-batch training, matching the dataset-sum L_data in the notes.
batch_size = 0
learning_rate = 1e-4
grad_clip_norm = 10.0
device = "auto"
log_every = 50
# Positive values overwrite checkpoint_latest.pt at this interval for crash
# recovery. A successful run removes it, leaving checkpoint_best.pt.
save_every = 100

# To stop gracefully, write one of these words into STOP_TRAINING.txt.
stop_file = "STOP_TRAINING.txt"
stop_keywords = ["stop", "quit", "exit", "halt"]

# Reduce learning rate when test MSE plateaus. Patience counts evaluation
# events, i.e. epochs where log/save triggers test evaluation.
lr_plateau_enabled = true
lr_plateau_factor = 0.7
lr_plateau_patience = 10
lr_plateau_min_lr = 1e-6
lr_plateau_min_delta = 1e-6

# Stop training when test MSE has not improved enough for this many
# evaluation events.
early_stopping_enabled = true
early_stopping_patience = 40
early_stopping_min_delta = 1e-7

[symbolic]

# Feature selection before symbolic regression
top_k = 7
feature_selection = "scaled_encoder_norm" # encoder_norm | scaled_encoder_norm | manual
selected_invariants = []                  # used only when feature_selection = "manual"
target_transform = "identity"             # identity | square

# Saving / output
output_subdir = "symbolic2"

# Search
niterations = 10000000
timeout_hours = 24.0
warm_start = true

parallelism = "multiprocessing"
numprocs = 8

batching = true
batch_size = 100

populations = 24
population_size = 50
ncycles_per_iteration = 5000

# Model selection / reproducibility
model_selection = "best"
random_state = 42

# Loss
# MSE:
# elementwise_loss = "loss(prediction, target) = (prediction - target)^2"
#
# Weighted relative MSE:
# elementwise_loss = "loss(prediction, target, weight) = weight * (prediction - target)^2"
# weight_mode = "inverse_target_squared"
#
# Positivity-aware weighted MSE:
# elementwise_loss = "loss(prediction, target, weight) = weight * (prediction - target)^2 + 1.0 * ifelse(prediction < 0.0, prediction^2, 0.0)"
elementwise_loss = "loss(prediction, target, weight) = weight * (prediction - target)^2"
weight_mode = "inverse_target_squared"

# Operators
binary_operators = ["+", "-", "*", "/"]
unary_operators = ["square", "sqrt"]

# Complexity / search space
maxsize = 40
maxdepth = -1   # None in Python if needed

parsimony = 0.003
complexity_of_constants = 2

# Operator constraints
constraints = { square = 10, sqrt = 90, "*" = [8, 8] }
nested_constraints = { square = { square = 1 }, sqrt = { sqrt = 1 } }

# Numerical precision / display
precision = 64
progress = true

# Early stopping
early_stop_condition = "stop_if(loss, complexity) = loss < 1e-17"
