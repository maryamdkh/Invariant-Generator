# PySR configuration for the pruned rotated-Hill refit run.
# This config must match results/rotated_hill_prune/checkpoint_best.pt.

[data]
data_dir = "data"
dataset_name = "rotatedhill"
dataset_key = "stress"
stress_format = "voigt_3d"
feature_names = ["s11", "s22", "s33", "s23", "s13", "s12"]
test_size = 0.1
random_state = 42
shuffle = true

[noise]
enabled = false
scale = 0.02
random_state = 42
relative_to_feature_std = true

[augmentation]
enabled = true
include_original = true
augment_test = true
k_values = []
n_aug_per_sample = 5
k_range = [0.5, 1.75]
random_state = 42
shuffle = true
homogeneity_degree = 1.0
surface_target = 1.0

[invariants]
selected = ["I5", "I9", "I11", "I1", "I4"]
enable_second_order = true
enable_fourth_order = true
homogenize = true
init_scale = 0.05
eps = 1e-12

[encoder]
enabled = true
output_dim = 0
init = "identity"

[normalization]
enabled = true
eps = 1e-8
batch_size = 8192

[model]
hidden_dims = [64, 64]
activation = "silu"
output_activation = "softplus"

[loss]
lambda_param = 1e-6
lambda_structure = 1e-3
lambda_encoder_l1_ratio = 1e-3
lambda_encoder_l2 = 0.0
lambda_encoder_column_l2 = 0.25
eps = 1e-12

[constraints.A_psd]
enabled = true
mode = "hard"
target = "fourth_order_A"
basis = "mandel"
min_eigenvalue = 0.0
tolerance = 1e-8
penalty_weight = 1.0

[train]
run_id = "rotated_hill_prune"
results_dir = "results"
split_dir = "results/splits"
use_saved_split = true
save_split_if_missing = true
seed = 42
epochs = 50000
batch_size = 0
learning_rate = 1e-4
grad_clip_norm = 10.0
device = "auto"
log_every = 50
save_every = 100
stop_file = "STOP_TRAINING.txt"
stop_keywords = ["stop", "quit", "exit", "halt"]
lr_plateau_enabled = true
lr_plateau_factor = 0.5
lr_plateau_patience = 20
lr_plateau_min_lr = 1e-7
lr_plateau_min_delta = 1e-6
early_stopping_enabled = true
early_stopping_patience = 100
early_stopping_min_delta = 1e-7

[symbolic]
top_k = 5
feature_selection = "manual"
selected_invariants = ["I5", "I9", "I11", "I1", "I4"]
target_transform = "identity"

output_subdir = "symbolic_pruned_top5"

niterations = 10000000
timeout_hours = 24.0
warm_start = true

parallelism = "multiprocessing"
numprocs = 8

batching = true
batch_size = 100

populations = 24
population_size = 50
ncycles_per_iteration = 5000

model_selection = "best"
random_state = 42

elementwise_loss = "loss(prediction, target, weight) = weight * (prediction - target)^2"
weight_mode = "inverse_target_squared"

binary_operators = ["+", "-", "*", "/"]
unary_operators = ["square", "sqrt"]

maxsize = 40
maxdepth = -1

parsimony = 0.003
complexity_of_constants = 2

constraints = { square = 10, sqrt = 90, "*" = [8, 8] }
nested_constraints = { square = { square = 1 }, sqrt = { sqrt = 1 } }

precision = 64
progress = true
early_stop_condition = "stop_if(loss, complexity) = loss < 1e-17"
